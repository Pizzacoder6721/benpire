<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members — Benpire</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1 class="site-title"><a href="index.html">Benpire</a></h1>
    <p class="tagline">Empire of the Grand Benperor</p>
    <nav>
      <ul>
        <li><a href="about.html">About</a></li>
        <li><a href="memberList.html">Members</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="admission.html">Admission</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <div class="royal-divider">⚜</div>
  </header>

  <main>
    <p class="page-title">The Noble Registry</p>
    <ul class="member-list" id="memberList">
      <li style="opacity:0.5; font-style:italic; border-left-color:transparent;">
        Loading the registry...
      </li>
    </ul>
  </main>

  <footer>
    &copy; The Benpire &nbsp;✦&nbsp; All Territories Reserved
  </footer>

  <script>
    fetch('members.json', { cache: 'no-cache' })
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('memberList');
        list.innerHTML = '';

        data.members.forEach(member => {
          const li = document.createElement('li');

          // Peasantry: render as a sub-list
          if (member.peasants) {
            li.classList.add('peasant-row');

            const rankSpan = document.createElement('span');
            rankSpan.className = 'rank';
            rankSpan.textContent = member.rank;

            if (member.note) {
              const noteEm = document.createElement('em');
              noteEm.style.cssText = 'font-size:0.75rem; color:var(--text-dim); margin-left:0.4rem;';
              noteEm.textContent = `(${member.note})`;
              rankSpan.appendChild(noteEm);
            }

            li.appendChild(rankSpan);

            const subList = document.createElement('ul');
            subList.className = 'peasant-sublist';

            member.peasants.forEach(peasantName => {
              const subLi = document.createElement('li');
              subLi.textContent = peasantName;
              subList.appendChild(subLi);
            });

            li.appendChild(subList);

          } else {
            // Normal member row
            const rankSpan = document.createElement('span');
            rankSpan.className = 'rank';
            rankSpan.textContent = member.rank;

            if (member.note) {
              const noteEm = document.createElement('em');
              noteEm.style.cssText = 'font-size:0.75rem; color:var(--text-dim); margin-left:0.4rem;';
              noteEm.textContent = `(${member.note})`;
              rankSpan.appendChild(noteEm);
            }

            const nameSpan = document.createElement('span');
            nameSpan.className = 'name';
            nameSpan.textContent = member.name;

            li.appendChild(rankSpan);
            li.appendChild(nameSpan);
          }

          list.appendChild(li);
        });
      })
      .catch(err => {
        document.getElementById('memberList').innerHTML =
          '<li style="color:var(--red-bright);">Failed to load the registry. The scrolls may be missing.</li>';
        console.error('Failed to load members.json:', err);
      });
  </script>

  <!-- Chat Widget -->
  <div id="chat-button">⚜</div>
  <div id="chat-box">
    <div id="chat-header">
      <span>Imperial Advisor</span>
      <button id="chat-clear">Clear</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" placeholder="Speak, traveler..." />
      <button id="chat-send">➤</button>
    </div>
  </div>
  <script src="chat.js"></script>

</body>
</html>
